## => Site Settings
##############################
theme: jekyll-text-theme
text_skin: default # "default" (default), "dark", "forest", "ocean", "chocolate", "orange"
highlight_theme: default # "default" (default), "tomorrow", "tomorrow-night", "tomorrow-night-eighties", "tomorrow-night-blue", "tomorrow-night-bright"
url: "https://paynezheng.github.io"
baseurl: ""
title: Home
description: >
  Writings on tech, music, and life. Counterproductive optimization master.


## => Language and Timezone
##############################
lang: en
timezone: Asia/Hong_Kong


## => Author and Social
##############################
author:
  type      : person
  name      : Payne
  url       : https://github.com/paynezheng
  avatar    : /assets/img/avatar/avatar.jpg
  bio       : Counterproductive optimization master.
  email     : scutrookie@gmail.com
  github    : paynezheng


## => GitHub Repository (if the site is hosted by GitHub)
##############################
repository: paynezheng/Paynezheng.github.io
repository_tree: main


## => Paths
##############################
paths:
  root    :
  home    :
  archive : /archive.html
  rss     :


## => Post
##############################
## excerpt
excerpt_separator: <!--more-->

## license
license: CC-BY-NC-4.0

## TOC
toc:
  selectors: "h1,h2,h3"


## => Markdown Enhancements
##############################
## Mathjax
mathjax: true
mathjax_autoNumber: false

## Mermaid
mermaid: true

## Chart
chart: false


## => Paginate
##############################
paginate: 10
paginate_path: /page:num


## => Sources
##############################
sources: bootcdn


## => Sharing
##############################
sharing:
  provider: false


## => Comments
##############################
comments:
  provider: false


## => Pageview
##############################
pageview:
  provider: false


## => Search
##############################
search:
  provider: default


## => Analytics
##############################
analytics:
  provider: false


## => Build
##############################
markdown    : kramdown
highlighter : rouge
permalink   : date

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - start.sh
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: false
      license: false
      aside:
        toc: true
      show_edit_on_github: false
      show_subscribe: false
      pageview: false


## => Plugins
##############################
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
